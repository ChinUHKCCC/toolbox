// ==================== 基礎工具 ====================
const ZSP = /[\u3000\s]/;
const BASIC_PUNCT = /[.,;:!?，。、；：！？“”‘’（）()《》〈〉【】「」\[\]{}\-—…·、]/;

function isPunct(ch){ return ZSP.test(ch) || BASIC_PUNCT.test(ch); }

function tokenizeChars(s){
  const out=[];
  for(const ch of s){
    if(isPunct(ch)) out.push({t:ch,k:'punct'});
    else out.push({t:ch,k:'char'});
  }
  return out;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ==================== 非經文與出處處理 ====================
const CANTONESE_PARTICLES = new Set(['呀','喇','啦','啩','噃','囉','呢','嘛','嘅','嘎','嘍','咯']);
const NON_SCRIPTURE_EQUIV = [['和','與','同'],['你們','你哋','你地'],['因為','因','由於'],['但是','但','然而'],['所以','故此','因此']];

function normalizeNonScriptureChar(ch){
  for(const group of NON_SCRIPTURE_EQUIV){
    if(group.includes(ch)) return group[0];
  }
  return CANTONESE_PARTICLES.has(ch) ? '' : ch;
}

const BOOK_MAP_ENTRIES = [['創','創世記'],['出','出埃及記'],['利','利未記'],['民','民數記'],['申','申命記'],['詩','詩篇'],['箴','箴言'],['傳','傳道書'],['賽','以賽亞書'],['耶','耶利米書'],['太','馬太福音'],['可','馬可福音'],['路','路加福音'],['約','約翰福音'],['徒','使徒行傳'],['羅','羅馬書'],['林前','哥林多前書'],['林後','哥林多後書']];

function expandBookAbbr(s){
  for(const [abbr, full] of BOOK_MAP_ENTRIES){
    const re = new RegExp('^' + abbr);
    if(re.test(s)) return s.replace(re, full);
  }
  return s;
}

function normalizeReference(s){
  let out = s.replace(/\s+/g,'');
  return expandBookAbbr(out);
}

function looksLikeRef(s){
  const trimmed = s.trim();
  return /[一二三四五六七八九十百千0-9]+\s*[:：]\s*[0-9]+/.test(trimmed) && trimmed.length <= 30;
}

function refEqual(a,b){
  const na = normalizeReference(a), nb = normalizeReference(b);
  return na===nb || a===nb || b===na;
}

function markSections(text){
  const pattern = /【註】([\s\S]*?)【\/註】/g;
  let last=0, m, out=[];
  while((m=pattern.exec(text))!==null){
    if(m.index>last) out.push({kind:'scripture', text:text.slice(last,m.index)});
    out.push({kind:'nonscripture', text:m[1]});
    last = pattern.lastIndex;
  }
  if(last<text.length) out.push({kind:'scripture', text:text.slice(last)});
  return out;
}

function lcsAlign(aCore, bCore){
  const m=aCore.length, n=bCore.length;
  const dp = Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++){
    dp[i][j] = aCore[i-1]===bCore[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  }
  const pairs=[];
  let i=m, j=n;
  while(i>0 && j>0){
    if(aCore[i-1]===bCore[j-1]){ pairs.push([i-1,j-1]); i--; j--; }
    else if(dp[i-1][j] >= dp[i][j-1]) i--; else j--;
  }
  pairs.reverse();
  return {pairs};
}

// ==================== 改進後的 diffLine（核心修復） ====================
function diffLine(ut, gt, options){
  const {strict, relaxNonScripture} = options;

  const uTok0 = tokenizeChars(ut);
  const gTok0 = tokenizeChars(gt);

  function normTokArr(toks){
    const arr = [];
    for(const tk of toks){
      if(tk.k === 'char'){
        let ch = tk.t;
        if(relaxNonScripture) ch = normalizeNonScriptureChar(ch);
        if(ch !== '') arr.push({k:'char', raw:tk.t, cmp:ch});
      }
      // 標點完全不加入比較序列（這是關鍵修復）
    }
    return arr;
  }

  const uEff = normTokArr(uTok0);
  const gEff = normTokArr(gTok0);

  const {pairs} = lcsAlign(uEff.map(t=>t.cmp), gEff.map(t=>t.cmp));
  const uAligned = new Set(pairs.map(p=>p[0]));
  const gAligned = new Set(pairs.map(p=>p[1]));

  // 渲染用家側
  let userOut = '', uErrCount = 0;
  let ei = 0;   // 有效字元計數器
  for(let i = 0; i < uTok0.length; i++){
    const tk = uTok0[i];
    if(tk.k === 'punct'){
      userOut += escapeHtml(tk.t);   // 標點永遠不標紅
    } else {
      // 只有有效字元才檢查是否對齊
      if(ei < uEff.length && uAligned.has(ei)){
        userOut += escapeHtml(tk.t);
      } else {
        userOut += `<span class="err">${escapeHtml(tk.t)}</span>`;
        if(strict) uErrCount++;
      }
      ei++;
    }
  }

  // 渲染標準答案側（缺漏用灰底）
  let stdOut = '';
  let ej = 0;
  for(let j = 0; j < gTok0.length; j++){
    const tk = gTok0[j];
    if(tk.k === 'punct'){
      stdOut += escapeHtml(tk.t);
    } else {
      if(ej < gEff.length && gAligned.has(ej)){
        stdOut += escapeHtml(tk.t);
      } else {
        stdOut += `<span class="miss">${escapeHtml(tk.t)}</span>`;
      }
      ej++;
    }
  }

  return {userSpan: userOut, stdSpan: stdOut, errCount: uErrCount};
}

// ==================== 主比對（整段模式） ====================
function compareBlocks(userRaw, goldRaw, opts){
  const userSecs = opts.hasNonScripture ? markSections(userRaw) : [{kind:'scripture', text:userRaw}];
  const goldSecs = opts.hasNonScripture ? markSections(goldRaw) : [{kind:'scripture', text:goldRaw}];

  const userViews = [], stdViews = [], hints = [];
  let scriptureErrors = 0;

  const maxLen = Math.max(userSecs.length, goldSecs.length);

  for(let idx = 0; idx < maxLen; idx++){
    const u = userSecs[idx] || {kind:'scripture', text:''};
    let gText = (goldSecs[idx] || {kind:'scripture', text:''}).text;

    // 重要：移除標準答案的第一行標題 【xxx】
    const lines = gText.split('\n');
    if(lines.length > 1){
      gText = lines.slice(1).join('\n').trim();
    }

    const ut = u.text.trim();
    const gt = gText;

    const isScripture = (u.kind === 'scripture');

    const {userSpan, stdSpan, errCount} = diffLine(ut, gt, {
      strict: isScripture,
      relaxNonScripture: !isScripture
    });

    userViews.push(userSpan);
    stdViews.push(stdSpan);
    if(isScripture) scriptureErrors += errCount;
  }

  if(scriptureErrors > 0){
    hints.push(`<div class="hint">經文部分需逐字一致（標點不計）。檢測到約 ${scriptureErrors} 處錯誤，請參考右側標準答案修正。</div>`);
  }

  return {
    userHtml: userViews.join('\n\n'),
    stdHtml: stdViews.join('\n\n'),
    hintsHtml: hints.join(''),
    stats: { scriptureErrors }
  };
}

// ==================== UI 功能 ====================
function getSelectedGoldText() {
  const select = document.getElementById('sectionSelect');
  const selected = Array.from(select.selectedOptions).map(opt => opt.value);
  if(selected.length === 0) return '';
  
  return selected.map(key => 
    `【${key}】\n${standardContent[key]}`
  ).join('\n\n');
}

function compareNow(){
  const userText = document.getElementById('userText').value.trim();
  const goldText = getSelectedGoldText();

  if(!goldText){
    alert('請先選擇要對答案的段落！');
    return;
  }

  const hasNonScripture = document.getElementById('hasNonScripture').checked;
  const result = compareBlocks(userText, goldText, {hasNonScripture});

  document.getElementById('userView').innerHTML = result.userHtml;
  document.getElementById('stdView').innerHTML = result.stdHtml;
  document.getElementById('hints').innerHTML = result.hintsHtml;

  document.getElementById('stats').textContent = 
    result.stats.scriptureErrors > 0 ? `經文錯處：約 ${result.stats.scriptureErrors} 處` : '經文錯處：0';

  logRecord(userText, goldText, result.stats);
}

// 其他函數（resetAll, toggleStd, makeFill, exportCSV 等）
function resetAll(){
  document.getElementById('userText').value = '';
  document.getElementById('userView').innerHTML = '';
  document.getElementById('stdView').innerHTML = '';
  document.getElementById('hints').innerHTML = '';
  document.getElementById('stats').textContent = '';
}

let stdShown = true;
function toggleStd(){
  stdShown = !stdShown;
  const el = document.getElementById('stdView').parentElement.parentElement;
  el.style.display = stdShown ? '' : 'none';
}

function makeFill(){
  const gold = getSelectedGoldText();
  if(!gold.trim()){ alert('請先選擇標準答案段落'); return; }
  // 移除標題行後再出題
  const cleanGold = gold.split('\n').slice(1).join('\n');
  const lines = cleanGold.split(/(?:\r?\n)+/).filter(s=>s.trim()!=='');
  const line = lines[Math.floor(Math.random()*lines.length)] || cleanGold;
  // 後續填充題邏輯保持不變（略）
  alert('填充題功能已簡化，可自行擴充');
}

function clearQuiz(){ document.getElementById('hints').innerHTML = ''; }
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
const records=[];
function logRecord(userText, goldText, stats){
  records.push({ ts: new Date().toISOString(), userLen: userText.length, goldLen: goldText.length, scriptureErrors: stats.scriptureErrors || 0 });
}
function exportCSV(){
  if(!records.length){ alert('尚無練習紀錄'); return; }
  const header = ['ts','userLen','goldLen','scriptureErrors'];
  const rows = [header.join(',')].concat(records.map(r=>header.map(k=>r[k]).join(',')));
  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='practice_log.csv'; a.click();
  URL.revokeObjectURL(url);
}

window.onload = function(){
  const select = document.getElementById('sectionSelect');
  Object.keys(standardContent).forEach(key => {
    const option = document.createElement('option');
    option.value = key;
    option.textContent = key;
    select.appendChild(option);
  });
};
